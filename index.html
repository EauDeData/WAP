<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Node Editor</title>
<style>
  :root {
    --bg: #111318;
    --panel: #1a1d24;
    --border: #2a2d36;
    --accent: #4f8ef7;
    --accent2: #f74f7a;
    --accent3: #4ff7a0;
    --text: #d0d4e0;
    --text-dim: #5a5f70;
    --node-w: 200px;
    --port-r: 7px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #toolbar span {
    font-size: 11px;
    color: var(--text-dim);
    margin-right: 6px;
  }

  .btn {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 5px 11px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.run { border-color: var(--accent3); color: var(--accent3); }
  .btn.run:hover { background: var(--accent3); color: #111; }
  .btn.danger { border-color: var(--accent2); color: var(--accent2); }

  /* ── Canvas ── */
  #canvas-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #svg-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* ── Nodes ── */
  .node {
    position: absolute;
    width: var(--node-w);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: grab;
    user-select: none;
    z-index: 10;
    transition: border-color .15s, box-shadow .15s;
  }
  .node:hover, .node.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent)22;
  }
  .node.type-input  { border-top: 2px solid #f7a94f; }
  .node.type-fn     { border-top: 2px solid var(--accent); }
  .node.type-output { border-top: 2px solid var(--accent3); }

  .node-header {
    padding: 7px 10px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: .05em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .node-header .tag {
    font-size: 9px;
    color: var(--text-dim);
    font-weight: normal;
  }

  .node-body { padding: 8px 10px; }

  /* labels & inputs inside nodes */
  .node-body label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .node-body input[type=text],
  .node-body textarea,
  .node-body select {
    width: 100%;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    padding: 4px 6px;
    resize: none;
    outline: none;
  }
  .node-body input[type=text]:focus,
  .node-body textarea:focus { border-color: var(--accent); }

  .node-body .img-preview {
    width: 100%;
    height: 80px;
    object-fit: contain;
    border-radius: 3px;
    background: var(--bg);
    display: block;
    margin-top: 4px;
  }

  .node-body .output-val {
    font-size: 10px;
    color: var(--accent3);
    word-break: break-all;
    max-height: 80px;
    overflow-y: auto;
    background: var(--bg);
    padding: 4px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    white-space: pre-wrap;
  }

  .node-body .status {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .node-body .status.ok  { color: var(--accent3); }
  .node-body .status.err { color: var(--accent2); }

  /* ── Ports ── */
  .ports-row {
    display: flex;
    justify-content: space-between;
    padding: 0 0 4px 0;
    min-height: 14px;
  }
  .port-group { display: flex; flex-direction: column; gap: 6px; }
  .port-group.right { align-items: flex-end; }

  .port-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-dim);
    position: relative;
  }

  .port {
    width: calc(var(--port-r)*2);
    height: calc(var(--port-r)*2);
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    cursor: crosshair;
    flex-shrink: 0;
    transition: border-color .12s, background .12s;
  }
  .port:hover, .port.connected { border-color: var(--accent); background: var(--accent); }
  .port.out { border-color: #f7a94f; }
  .port.out:hover, .port.out.connected { background: #f7a94f; }

  /* port is positioned so that it overflows the node edge */
  .port-label.input-port { margin-left: -17px; }
  .port-label.output-port { margin-right: -17px; }

  /* SVG wires */
  .wire { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: .7; pointer-events: stroke; cursor: pointer; }
  .wire:hover { stroke: var(--accent2); opacity: 1; stroke-width: 2; }
  .wire-preview { fill:none; stroke: var(--accent); stroke-width:1.5; stroke-dasharray:5,4; opacity:.5; }

  /* file input hidden */
  #file-input { display: none; }

  /* node delete btn */
  .node-del {
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
  }
  .node-del:hover { color: var(--accent2); }
</style>
</head>
<body>

<div id="toolbar">
  <span>API NODES</span>
  <button class="btn" onclick="addNode('text-input')">+ Text Input</button>
  <button class="btn" onclick="addNode('image-input')">+ Image Input</button>
  <button class="btn" onclick="addNode('fn-detect')">+ detect_object</button>
  <button class="btn" onclick="addNode('fn-vlm')">+ ask_image</button>
  <button class="btn" onclick="addNode('fn-ner')">+ extract_entities</button>
  <button class="btn" onclick="addNode('fn-coords')">+ to_coordinates</button>
  <button class="btn" onclick="addNode('fn-asktext')">+ ask_text</button>
  <button class="btn" onclick="addNode('fn-concat')">+ concat_text</button>
  <button class="btn" onclick="addNode('output')">+ Output</button>
  <button class="btn run" onclick="runAll()">▶ Run All</button>
  <button class="btn danger" onclick="clearAll()">✕ Clear</button>
  <span style="margin-left:auto;color:var(--text-dim);font-size:10px">drag nodes · drag port→port to connect · click wire to delete</span>
</div>

<div id="canvas-wrap">
  <svg id="svg-layer"></svg>
  <div id="canvas"></div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
// ─── State ───────────────────────────────────────────────────────────
const API = 'http://158.109.8.116:8000';
let nodes = {};       // id → {el, type, x, y, ports:{name:{el,dir}}, data:{}}
let wires = [];       // [{from:{nid,port}, to:{nid,port}, el}]
let nodeCount = 0;

const canvas    = document.getElementById('canvas');
const svgLayer  = document.getElementById('svg-layer');
const canvasWrap= document.getElementById('canvas-wrap');

// ─── Port registry ───────────────────────────────────────────────────
// For each node port element, store {nid, portName, dir}
const portMap = new WeakMap();

// ─── Wire drawing state ───────────────────────────────────────────────
let draggingFrom = null; // {nid, portName, dir, el}
let previewLine  = null;

// ─── Node definitions ─────────────────────────────────────────────────
const NODE_DEFS = {
  'text-input': {
    label: 'Text Input', tag: 'input', typeClass: 'type-input',
    ports: { out: ['text'] },
    body: (n) => `
      <label>value</label>
      <textarea rows="2" oninput="nodeData('${n.id}','text',this.value)">${n.data.text||''}</textarea>
    `
  },
  'image-input': {
    label: 'Image Input', tag: 'input', typeClass: 'type-input',
    ports: { out: ['image_b64'] },
    body: (n) => `
      <label>image (512×512)</label>
      <button class="btn" style="width:100%;margin-bottom:4px" onclick="pickImage('${n.id}')">Upload…</button>
      ${n.data.image_b64 ? `<img class="img-preview" src="data:image/png;base64,${n.data.image_b64}">` : ''}
    `
  },
  'fn-detect': {
    label: 'detect_object', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['object_name','image_b64'], out: ['detected','confidence','cropped_image'] },
    body: (n) => `
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'fn-vlm': {
    label: 'ask_image', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['image_b64','question'], out: ['answer'] },
    body: (n) => `
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'fn-ner': {
    label: 'extract_entities', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['text','entity_type'], out: ['entities'] },
    body: (n) => `
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'fn-coords': {
    label: 'to_coordinates', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['places_text'], out: ['coordinates'] },
    body: (n) => `
      <label style="font-size:9px;color:var(--text-dim)">places_text: comma-separated</label>
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'fn-asktext': {
    label: 'ask_text', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['context','query'], out: ['answer'] },
    body: (n) => `
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'fn-concat': {
    label: 'concat_text', tag: 'fn', typeClass: 'type-fn',
    ports: { in: ['text_a','text_b'], out: ['result'] },
    body: (n) => `
      <div class="status ${n.data._status||''}">${n.data._msg||'idle'}</div>
    `
  },
  'output': {
    label: 'Output', tag: 'output', typeClass: 'type-output',
    ports: { in: ['value'] },
    body: (n) => {
      const v = n.data.value;
      if (!v) return `<div class="output-val">—</div>`;
      if (typeof v === 'string' && v.length > 20 && isBase64(v))
        return `<img class="img-preview" src="data:image/png;base64,${v}">`;
      return `<div class="output-val">${typeof v === 'object' ? JSON.stringify(v,null,2) : String(v)}</div>`;
    }
  }
};

function isBase64(s) {
  return /^[A-Za-z0-9+/]+=*$/.test(s.replace(/\s/g,''));
}

// ─── Add node ─────────────────────────────────────────────────────────
function addNode(type, x, y) {
  const id = 'n' + (++nodeCount);
  x = x ?? 80 + Math.random()*300;
  y = y ?? 80 + Math.random()*200;

  const def = NODE_DEFS[type];
  const el = document.createElement('div');
  el.className = `node ${def.typeClass}`;
  el.id = id;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  const n = { id, type, el, x, y, ports: {}, data: {} };
  nodes[id] = n;

  renderNode(n);
  canvas.appendChild(el);
  makeDraggable(el, n);
  return n;
}

function renderNode(n) {
  const def = NODE_DEFS[n.type];
  const ins  = def.ports.in  || [];
  const outs = def.ports.out || [];

  const inHTML = ins.map(p => `
    <div class="port-label input-port">
      <div class="port in" data-nid="${n.id}" data-port="${p}" data-dir="in"></div>
      <span>${p}</span>
    </div>`).join('');

  const outHTML = outs.map(p => `
    <div class="port-label output-port">
      <span>${p}</span>
      <div class="port out" data-nid="${n.id}" data-port="${p}" data-dir="out"></div>
    </div>`).join('');

  n.el.innerHTML = `
    <div class="node-header">
      <span>${def.label}</span>
      <span class="tag">${def.tag}</span>
      <span class="node-del" onclick="deleteNode('${n.id}')">✕</span>
    </div>
    <div class="ports-row" style="padding:8px 10px 0">
      <div class="port-group left">${inHTML}</div>
      <div class="port-group right">${outHTML}</div>
    </div>
    <div class="node-body">${def.body(n)}</div>
  `;

  // Register ports
  n.el.querySelectorAll('.port').forEach(pel => {
    const pname = pel.dataset.port;
    const dir   = pel.dataset.dir;
    n.ports[pname] = { el: pel, dir };
    portMap.set(pel, { nid: n.id, portName: pname, dir });
    pel.addEventListener('mousedown', onPortMouseDown);
  });
}

function nodeData(nid, key, val) {
  nodes[nid].data[key] = val;
}

// ─── Drag nodes ───────────────────────────────────────────────────────
function makeDraggable(el, n) {
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.port') || e.target.closest('.node-del') ||
        e.target.tagName==='TEXTAREA' || e.target.tagName==='INPUT' ||
        e.target.tagName==='BUTTON' || e.target.tagName==='SELECT') return;
    e.preventDefault();
    const startX = e.clientX - n.x;
    const startY = e.clientY - n.y;
    const move = ev => {
      n.x = ev.clientX - startX;
      n.y = ev.clientY - startY;
      el.style.left = n.x + 'px';
      el.style.top  = n.y + 'px';
      redrawWires();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
}

// ─── Wires ────────────────────────────────────────────────────────────
function portCenter(nid, portName) {
  const n   = nodes[nid];
  const p   = n.ports[portName];
  if (!p) return {x:0,y:0};
  const pr  = p.el.getBoundingClientRect();
  const wr  = canvasWrap.getBoundingClientRect();
  return { x: pr.left - wr.left + pr.width/2, y: pr.top - wr.top + pr.height/2 };
}

function drawCurve(x1,y1,x2,y2) {
  const dx = Math.abs(x2-x1)*0.5;
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

function redrawWires() {
  // Remove old wire elements
  svgLayer.querySelectorAll('.wire').forEach(e=>e.remove());
  wires.forEach(w => {
    const a = portCenter(w.from.nid, w.from.port);
    const b = portCenter(w.to.nid,   w.to.port);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','wire');
    path.setAttribute('d', drawCurve(a.x,a.y,b.x,b.y));
    path.addEventListener('click', () => deleteWire(w));
    svgLayer.appendChild(path);
  });
}

function deleteWire(w) {
  wires = wires.filter(x => x !== w);
  redrawWires();
  updatePortConnected();
}

function updatePortConnected() {
  // Reset all
  Object.values(nodes).forEach(n =>
    Object.values(n.ports).forEach(p => p.el.classList.remove('connected'))
  );
  wires.forEach(w => {
    const a = nodes[w.from.nid]?.ports[w.from.port];
    const b = nodes[w.to.nid]?.ports[w.to.port];
    if (a) a.el.classList.add('connected');
    if (b) b.el.classList.add('connected');
  });
}

// ─── Port drag to connect ──────────────────────────────────────────────
function onPortMouseDown(e) {
  e.stopPropagation();
  e.preventDefault();
  const info = portMap.get(e.currentTarget);
  draggingFrom = { ...info, el: e.currentTarget };

  previewLine = document.createElementNS('http://www.w3.org/2000/svg','path');
  previewLine.setAttribute('class','wire-preview');
  svgLayer.appendChild(previewLine);

  const wr = canvasWrap.getBoundingClientRect();
  const move = ev => {
    const a = portCenter(draggingFrom.nid, draggingFrom.portName);
    const bx = ev.clientX - wr.left;
    const by = ev.clientY - wr.top;
    previewLine.setAttribute('d', drawCurve(a.x,a.y,bx,by));
  };
  const up = ev => {
    window.removeEventListener('mousemove', move);
    window.removeEventListener('mouseup', up);
    previewLine.remove(); previewLine = null;

    // Check if released on a port
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    if (target && target.classList.contains('port')) {
      const info2 = portMap.get(target);
      if (info2 && info2.nid !== draggingFrom.nid) {
        // Ensure one is in and one is out
        let from, to;
        if (draggingFrom.dir === 'out' && info2.dir === 'in') {
          from = { nid: draggingFrom.nid, port: draggingFrom.portName };
          to   = { nid: info2.nid,        port: info2.portName };
        } else if (draggingFrom.dir === 'in' && info2.dir === 'out') {
          from = { nid: info2.nid,        port: info2.portName };
          to   = { nid: draggingFrom.nid, port: draggingFrom.portName };
        }
        if (from && to) {
          // Remove existing wire to same input port
          wires = wires.filter(w => !(w.to.nid===to.nid && w.to.port===to.port));
          wires.push({ from, to });
          redrawWires();
          updatePortConnected();
        }
      }
    }
    draggingFrom = null;
  };
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
}

// ─── Image upload ─────────────────────────────────────────────────────
let pendingImageNode = null;
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || !pendingImageNode) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 512, 512);
      const b64 = c.toDataURL('image/png').split(',')[1];
      nodes[pendingImageNode].data.image_b64 = b64;
      renderNode(nodes[pendingImageNode]);
      // Re-register ports after re-render
      nodes[pendingImageNode].el.querySelectorAll('.port').forEach(pel => {
        const pname = pel.dataset.port;
        const dir   = pel.dataset.dir;
        nodes[pendingImageNode].ports[pname] = { el: pel, dir };
        portMap.set(pel, { nid: pendingImageNode, portName: pname, dir });
        pel.addEventListener('mousedown', onPortMouseDown);
      });
      redrawWires();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function pickImage(nid) {
  pendingImageNode = nid;
  document.getElementById('file-input').click();
}

// ─── Delete node ──────────────────────────────────────────────────────
function deleteNode(nid) {
  wires = wires.filter(w => w.from.nid !== nid && w.to.nid !== nid);
  nodes[nid].el.remove();
  delete nodes[nid];
  redrawWires();
}

// ─── Resolve wire value ───────────────────────────────────────────────
function resolveInput(nid, portName) {
  // Find wire going into nid:portName
  const w = wires.find(x => x.to.nid === nid && x.to.port === portName);
  if (!w) return undefined;
  return resolveOutput(w.from.nid, w.from.port);
}

function resolveOutput(nid, portName) {
  const n = nodes[nid];
  // For input nodes, return their data
  if (n.type === 'text-input')  return n.data.text || '';
  if (n.type === 'image-input') return n.data.image_b64 || null;
  // For fn nodes, return cached output
  return n.data._out?.[portName];
}

// ─── Run pipeline ─────────────────────────────────────────────────────
async function runAll() {
  // Topological: just run fn nodes in creation order (simple, works for DAGs)
const order = Object.values(nodes).filter(n =>
    ['fn-detect','fn-vlm','fn-ner','fn-coords','fn-asktext','fn-concat'].includes(n.type)
  );

  for (const n of order) {
    await runNode(n);
  }

  // Update output nodes
  Object.values(nodes).filter(n => n.type === 'output').forEach(n => {
    const val = resolveInput(n.id, 'value');
    n.data.value = val;
    renderNode(n);
    reRegisterPorts(n);
  });

  redrawWires();
}

async function runNode(n) {
  setStatus(n, '', 'running…');
  try {
    if (n.type === 'fn-detect') {
      const obj = resolveInput(n.id,'object_name');
      const img = resolveInput(n.id,'image_b64');
      if (!img) throw new Error('no image');
      const res = await apiFetch('/detect_object/', { object_name: obj||'object', image_base64: img });
      n.data._out = { detected: res.detected, confidence: res.confidence, cropped_image: res.image_base64 };
      setStatus(n, 'ok', `detected:${res.detected} conf:${res.confidence?.toFixed(2)??'-'}`);
    }
    else if (n.type === 'fn-vlm') {
      const img = resolveInput(n.id,'image_b64');
      const q   = resolveInput(n.id,'question');
      if (!img) throw new Error('no image');
      const res = await apiFetch('/ask_image/', {
        image_base64: img,
        question: q||'What is in this image?',
        ip_address: '158.109.8.133:7000',
        model_name: 'mistralai/Pixtral-12B-2409'
      });
      n.data._out = { answer: res.answer };
      setStatus(n, 'ok', res.answer?.slice(0,60)+'…');
    }
    else if (n.type === 'fn-ner') {
      const text = resolveInput(n.id,'text');
      const etype= resolveInput(n.id,'entity_type');
      if (!text) throw new Error('no text');
      const res = await apiFetch('/extract_entities/', { text, entity_type: etype||'ORG' });
      n.data._out = { entities: res.entities };
      setStatus(n, 'ok', JSON.stringify(res.entities));
    }
    else if (n.type === 'fn-coords') {
      const raw = resolveInput(n.id,'places_text');
      if (!raw) throw new Error('no places');
      const places = raw.split(',').map(s=>s.trim()).filter(Boolean);
      const res = await apiFetch('/to_coordinates/', { places });
      n.data._out = { coordinates: res.results };
      setStatus(n, 'ok', `${res.results?.length} places resolved`);
    }
   else if (n.type === 'fn-asktext') {
      const context = resolveInput(n.id,'context');
      const query   = resolveInput(n.id,'query');
      if (!query) throw new Error('no query');
      const res = await apiFetch('/ask_text/', {
        context: context || '',
        query,
        ip_address: '158.109.8.133:7000',
        model_name: 'mistralai/Pixtral-12B-2409'
      });
      n.data._out = { answer: res.answer };
      setStatus(n, 'ok', res.answer?.slice(0,60)+'…');
    }
    else if (n.type === 'fn-concat') {
      const text_a = resolveInput(n.id,'text_a');
      const text_b = resolveInput(n.id,'text_b');
      const res = await apiFetch('/concat_text/', {
        text_a: text_a || '',
        text_b: text_b || ''
      });
      n.data._out = { result: res.result };
      setStatus(n, 'ok', res.result?.slice(0,60));
    }
  } catch(err) {
    setStatus(n, 'err', String(err));
  }
  renderNode(n);
  reRegisterPorts(n);
}

function setStatus(n, cls, msg) {
  n.data._status = cls;
  n.data._msg    = msg;
}

async function apiFetch(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function reRegisterPorts(n) {
  n.el.querySelectorAll('.port').forEach(pel => {
    const pname = pel.dataset.port;
    const dir   = pel.dataset.dir;
    n.ports[pname] = { el: pel, dir };
    portMap.set(pel, { nid: n.id, portName: pname, dir });
    pel.addEventListener('mousedown', onPortMouseDown);
  });
  updatePortConnected();
}

function clearAll() {
  Object.keys(nodes).forEach(nid => nodes[nid].el.remove());
  nodes = {};
  wires = [];
  svgLayer.querySelectorAll('.wire').forEach(e=>e.remove());
}

// Keep SVG sized to canvas-wrap
function sizeSVG() {
  const r = canvasWrap.getBoundingClientRect();
  svgLayer.setAttribute('width',  r.width);
  svgLayer.setAttribute('height', r.height);
}
window.addEventListener('resize', () => { sizeSVG(); redrawWires(); });
sizeSVG();
</script>
</body>
